# Docker Compose for running shuvcode
#
# Quick start:
#   cd docker && docker compose up
#
# This builds everything from source and starts the server at http://localhost:4096

services:
  shuvcode:
    build:
      context: ..
      dockerfile: packages/opencode/Dockerfile
    ports:
      - "4096:4096"
    volumes:
      # Mount a workspace directory for the agent to work in
      - ./workspace:/workspace
      # Persist opencode data (sessions, config, etc.)
      - shuvcode-data:/root/.opencode
    environment:
      # API keys - set these in your environment or .env file
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY:-}
      # Git user config - set these to use your own identity for commits
      - GIT_AUTHOR_NAME=${GIT_AUTHOR_NAME:-shuvcode}
      - GIT_AUTHOR_EMAIL=${GIT_AUTHOR_EMAIL:-shuvcode@localhost}
      - GIT_COMMITTER_NAME=${GIT_COMMITTER_NAME:-shuvcode}
      - GIT_COMMITTER_EMAIL=${GIT_COMMITTER_EMAIL:-shuvcode@localhost}
    working_dir: /workspace
    restart: unless-stopped

volumes:
  shuvcode-data:
