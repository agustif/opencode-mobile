name: shuvcode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  shuvcode:
    if: |
      contains(github.event.comment.body, '/shuv') ||
      contains(github.event.comment.body, '/shuvcode') ||
      contains(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, '/opencode')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Checkout integration branch for upstream-sync issues (non-PR issues)
      - name: Checkout integration branch for sync issues
        if: ${{ !github.event.issue.pull_request && contains(github.event.issue.labels.*.name, 'upstream-sync') }}
        run: git checkout integration

      - uses: ./.github/actions/setup-bun

      - name: Run shuvcode
        uses: Latitudes-Dev/shuvcode/github@integration
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          OPENCODE_PERMISSION: '{"external_directory": "allow"}'
        with:
          model: anthropic/claude-opus-4-5
