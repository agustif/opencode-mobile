name: Upstream Sync

on:
  schedule:
    - cron: "* * * * *" # Check for new releases every minute
  workflow_dispatch:
    inputs:
      force_sync:
        description: "Force sync even if no new release"
        type: boolean
        default: false

concurrency:
  group: upstream-sync
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  check-release:
    runs-on: self-hosted
    container:
      image: alpine:3.20
    env:
      GITHUB_TOKEN: ${{ github.token }}
    outputs:
      new_release: ${{ steps.check.outputs.new_release }}
      latest_tag: ${{ steps.check.outputs.latest_tag }}
      latest_sha: ${{ steps.check.outputs.latest_sha }}
    steps:
      - name: Install tooling
        run: apk add --no-cache curl jq coreutils

      - name: Check for new release via API
        id: check
        env:
          FORCE_SYNC: ${{ inputs.force_sync }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          api() {
            local url="$1"
            if [ -n "${GITHUB_TOKEN:-}" ]; then
              curl -fsSL -H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${GITHUB_TOKEN}" "$url"
            else
              curl -fsSL -H "Accept: application/vnd.github+json" "$url"
            fi
          }

          api_with_status() {
            local url="$1"
            local output="$2"
            if [ -n "${GITHUB_TOKEN:-}" ]; then
              curl -sS -w "%{http_code}" -o "$output" -H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${GITHUB_TOKEN}" "$url"
            else
              curl -sS -w "%{http_code}" -o "$output" -H "Accept: application/vnd.github+json" "$url"
            fi
          }

          RELEASE=$(api "https://api.github.com/repos/sst/opencode/releases/latest")
          LATEST_TAG=$(echo "$RELEASE" | jq -r '.tag_name')

          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "null" ]; then
            echo "Unable to determine latest upstream tag" >&2
            exit 1
          fi

          TAG_REF=$(api "https://api.github.com/repos/sst/opencode/git/ref/tags/$LATEST_TAG")
          REF_TYPE=$(echo "$TAG_REF" | jq -r '.object.type')
          REF_SHA=$(echo "$TAG_REF" | jq -r '.object.sha')

          if [ -z "$REF_SHA" ] || [ "$REF_SHA" = "null" ]; then
            echo "Unable to resolve tag ref for $LATEST_TAG" >&2
            exit 1
          fi

          if [ "$REF_TYPE" = "tag" ]; then
            TAG_OBJECT=$(api "https://api.github.com/repos/sst/opencode/git/tags/$REF_SHA")
            LATEST_SHA=$(echo "$TAG_OBJECT" | jq -r '.object.sha')
          else
            LATEST_SHA="$REF_SHA"
          fi

          if [ -z "$LATEST_SHA" ] || [ "$LATEST_SHA" = "null" ]; then
            echo "Unable to resolve commit SHA for $LATEST_TAG" >&2
            exit 1
          fi

          TMP=$(mktemp)
          STATUS=$(api_with_status "https://api.github.com/repos/$REPO/contents/.github/last-synced-tag" "$TMP" || true)

          if [ "$STATUS" = "200" ]; then
            LAST_SYNCED=$(jq -r '.content' "$TMP" | base64 -d | tr -d '\n')
          elif [ "$STATUS" = "404" ]; then
            LAST_SYNCED=""
          else
            echo "Failed to read .github/last-synced-tag (status $STATUS)" >&2
            cat "$TMP" >&2 || true
            rm -f "$TMP"
            exit 1
          fi
          rm -f "$TMP"

          FORCE=${FORCE_SYNC:-false}

          echo "Latest upstream tag: $LATEST_TAG ($LATEST_SHA)"
          echo "Last synced tag: ${LAST_SYNCED:-<none>}"

          if [ "$LATEST_TAG" != "$LAST_SYNCED" ] || [ "$FORCE" = "true" ]; then
            echo "New release detected or force sync requested"
            echo "new_release=true" >> "$GITHUB_OUTPUT"
            echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
            echo "latest_sha=$LATEST_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "No new release detected"
            echo "new_release=false" >> "$GITHUB_OUTPUT"
          fi

  merge-upstream:
    needs: check-release
    if: needs.check-release.outputs.new_release == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      merge_status: ${{ steps.merge.outputs.status }}
      conflict_files: ${{ steps.merge.outputs.conflict_files }}
    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          ref: integration
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/sst/opencode.git 2>/dev/null || true

      - name: Fetch upstream tag
        run: |
          git fetch upstream --tags
          git fetch upstream tag ${{ needs.check-release.outputs.latest_tag }} --no-tags

      - name: Attempt merge
        id: merge
        run: |
          # Attempt merge with no-commit to detect conflicts first
          if git merge ${{ needs.check-release.outputs.latest_tag }} --no-commit --no-ff 2>&1; then
            echo "Merge successful, no conflicts"
            # Check if there are changes to commit
            if git diff --cached --quiet; then
              echo "Already up to date, nothing to merge"
              echo "status=up-to-date" >> $GITHUB_OUTPUT
            else
              git commit -m "sync: merge upstream ${{ needs.check-release.outputs.latest_tag }} into integration"
              echo "status=success" >> $GITHUB_OUTPUT
            fi
          else
            # Check for conflicts
            CONFLICTS=$(git diff --name-only --diff-filter=U)
            if [ -n "$CONFLICTS" ]; then
              echo "Conflicts detected in: $CONFLICTS"
              echo "status=conflict" >> $GITHUB_OUTPUT
              echo "conflict_files<<EOF" >> $GITHUB_OUTPUT
              echo "$CONFLICTS" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT

              # Attempt auto-resolution for known patterns
              UNRESOLVED=""
              for file in $CONFLICTS; do
                case "$file" in
                  bun.lock)
                    echo "Auto-resolving bun.lock by accepting upstream..."
                    git checkout --theirs bun.lock 2>/dev/null || true
                    git add bun.lock
                    ;;
                  *.md)
                    echo "Auto-resolving $file (accepting upstream)..."
                    git checkout --theirs "$file"
                    git add "$file"
                    ;;
                  *)
                    UNRESOLVED="$UNRESOLVED $file"
                    ;;
                esac
              done

              # Check if all conflicts were resolved
              REMAINING=$(git diff --name-only --diff-filter=U)
              if [ -z "$REMAINING" ]; then
                echo "All conflicts auto-resolved"
                git commit -m "sync: merge upstream ${{ needs.check-release.outputs.latest_tag }} into integration (auto-resolved conflicts)"
                echo "status=auto-resolved" >> $GITHUB_OUTPUT
              else
                echo "Unresolved conflicts remain: $REMAINING"
                git merge --abort
                echo "status=needs-manual" >> $GITHUB_OUTPUT
              fi
            else
              echo "Merge failed for unknown reason"
              git merge --abort 2>/dev/null || true
              echo "status=failed" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Push integration branch
        if: steps.merge.outputs.status == 'success' || steps.merge.outputs.status == 'auto-resolved'
        run: |
          git push origin integration

      - name: Update last synced tag marker
        if: steps.merge.outputs.status == 'success' || steps.merge.outputs.status == 'auto-resolved' || steps.merge.outputs.status == 'up-to-date'
        run: |
          echo "${{ needs.check-release.outputs.latest_tag }}" > .github/last-synced-tag
          git add .github/last-synced-tag
          git commit -m "sync: record last synced tag ${{ needs.check-release.outputs.latest_tag }}" || true
          git push origin integration || true

  validate:
    needs: [check-release, merge-upstream]
    if: needs.merge-upstream.outputs.merge_status == 'success' || needs.merge-upstream.outputs.merge_status == 'auto-resolved' || needs.merge-upstream.outputs.merge_status == 'up-to-date'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      validation_status: ${{ steps.validate.outputs.status }}
      validation_error: ${{ steps.validate.outputs.error }}
    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          ref: integration

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run validation
        id: validate
        run: |
          set +e

          echo "Running typecheck..."
          bun turbo typecheck
          if [ $? -ne 0 ]; then
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "error=typecheck failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "Running tests..."
          bun turbo test
          if [ $? -ne 0 ]; then
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "error=tests failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "Running build..."
          bun turbo build
          if [ $? -ne 0 ]; then
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "error=build failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "status=success" >> $GITHUB_OUTPUT

  create-issue:
    needs: [check-release, merge-upstream, validate]
    if: |
      always() &&
      (needs.merge-upstream.outputs.merge_status == 'needs-manual' ||
       needs.merge-upstream.outputs.merge_status == 'failed' ||
       needs.validate.outputs.validation_status == 'failed')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      issue_number: ${{ steps.create-conflict-issue.outputs.issue_number || steps.create-validation-issue.outputs.issue_number }}
    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          ref: integration

      - name: Create conflict issue
        id: create-conflict-issue
        if: needs.merge-upstream.outputs.merge_status == 'needs-manual'
        uses: actions/github-script@v7
        with:
          script: |
            const conflictFiles = `${{ needs.merge-upstream.outputs.conflict_files }}`;
            const latestTag = `${{ needs.check-release.outputs.latest_tag }}`;
            const latestSha = `${{ needs.check-release.outputs.latest_sha }}`;
            const issueTitle = `[Upstream Sync] Merge conflict with ${latestTag}`;

            // Check if an issue with this title already exists
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-sync'
            });

            const duplicate = existingIssues.data.find(issue => issue.title === issueTitle);
            if (duplicate) {
              console.log(`Issue already exists: #${duplicate.number}`);
              core.setOutput('issue_number', duplicate.number);
              core.setOutput('is_duplicate', 'true');
              return;
            }

            const body = `## Upstream Sync Conflict Report

            **Trigger**: Upstream sync at ${new Date().toISOString()}
            **Upstream Tag**: ${latestTag}
            **Upstream SHA**: ${latestSha}

            ### Conflicting Files

            \`\`\`
            ${conflictFiles}
            \`\`\`

            ### Recommended Actions

            1. Checkout integration branch locally
            2. Run: \`git fetch upstream && git merge ${latestTag}\`
            3. Resolve conflicts manually
            4. Run validation: \`bun install && bun turbo typecheck && bun turbo test\`
            5. Push resolved integration branch
            6. Close this issue

            ### Manual Sync Commands

            \`\`\`bash
            git remote add upstream https://github.com/sst/opencode.git 2>/dev/null || true
            git fetch upstream --tags
            git checkout integration
            git merge ${latestTag}
            # Resolve conflicts...
            bun install
            bun turbo typecheck
            bun turbo test
            git push origin integration
            \`\`\`
            `;

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: body,
              labels: ['upstream-sync', 'needs-manual-review']
            });

            core.setOutput('issue_number', issue.data.number);
            core.setOutput('is_duplicate', 'false');

      - name: Create validation failure issue
        id: create-validation-issue
        if: needs.validate.outputs.validation_status == 'failed'
        uses: actions/github-script@v7
        with:
          script: |
            const latestTag = `${{ needs.check-release.outputs.latest_tag }}`;
            const error = `${{ needs.validate.outputs.validation_error }}`;
            const issueTitle = `[Upstream Sync] Validation failed after merging ${latestTag}`;

            // Check if an issue with this title already exists
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-sync'
            });

            const duplicate = existingIssues.data.find(issue => issue.title === issueTitle);
            if (duplicate) {
              console.log(`Issue already exists: #${duplicate.number}`);
              core.setOutput('issue_number', duplicate.number);
              core.setOutput('is_duplicate', 'true');
              return;
            }

            const body = `## Upstream Sync Validation Failure

            **Trigger**: Upstream sync at ${new Date().toISOString()}
            **Upstream Tag**: ${latestTag}
            **Error**: ${error}

            ### What happened

            The upstream sync merged successfully, but post-merge validation failed.

            ### Recommended Actions

            1. Check the [workflow run](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}) for detailed logs
            2. Checkout integration branch locally
            3. Run the failing validation step locally to debug
            4. Fix any issues and push to integration

            ### Validation Commands

            \`\`\`bash
            git fetch origin
            git checkout integration
            bun install
            bun turbo typecheck
            bun turbo test
            bun turbo build
            \`\`\`
            `;

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: body,
              labels: ['upstream-sync', 'needs-manual-review']
            });

            core.setOutput('issue_number', issue.data.number);
            core.setOutput('is_duplicate', 'false');

  close-issues-on-success:
    needs: [check-release, merge-upstream, validate]
    if: |
      always() &&
      needs.validate.outputs.validation_status == 'success' &&
      (needs.merge-upstream.outputs.merge_status == 'success' || needs.merge-upstream.outputs.merge_status == 'auto-resolved')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Close related upstream-sync issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const latestTag = `${{ needs.check-release.outputs.latest_tag }}`;

            // Find all open upstream-sync issues
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-sync'
            });

            for (const issue of issues.data) {
              // Close issues related to this tag or older
              if (issue.title.includes('[Upstream Sync]')) {
                console.log(`Closing issue #${issue.number}: ${issue.title}`);
                
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `✅ Automatically closed - upstream sync to ${latestTag} completed successfully.\n\nValidation passed: typecheck, tests, and build all succeeded.`
                });
                
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                  state_reason: 'completed'
                });
              }
            }

  trigger-opencode:
    needs: [check-release, merge-upstream, create-issue]
    if: |
      always() &&
      needs.create-issue.outputs.issue_number != ''
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Trigger opencode to resolve conflicts
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const issueNumber = parseInt(`${{ needs.create-issue.outputs.issue_number }}`);
            const latestTag = `${{ needs.check-release.outputs.latest_tag }}`;
            const conflictFiles = `${{ needs.merge-upstream.outputs.conflict_files }}`;
            const mergeStatus = `${{ needs.merge-upstream.outputs.merge_status }}`;

            // Build the opencode prompt based on the issue type
            let prompt;

            if (mergeStatus === 'needs-manual') {
              prompt = `/opencode

            ## Task: Resolve Upstream Merge Conflicts

            Sync the shuvcode fork from upstream sst/opencode tag **${latestTag}**, resolve all merge conflicts, and complete the integration.

            ### Repository Context
            - **Upstream**: \`sst/opencode\` (original project)
            - **Fork**: \`Latitudes-Dev/shuvcode\` (customized downstream fork)
            - **Integration branch**: \`integration\` (where we merge upstream changes)

            ### Conflicting Files
            \`\`\`
            ${conflictFiles}
            \`\`\`

            ### Conflict Resolution Strategy

            Follow these resolution patterns for each file type:

            | File Pattern | Resolution |
            |--------------|------------|
            | \`STATS.md\`, \`nix/hashes.json\` | Accept upstream (\`git checkout --theirs\`) |
            | \`bun.lock\` | Delete and regenerate with \`bun install\` |
            | \`packages/opencode/script/publish.ts\` | Keep ours (fork-specific publishing) |
            | \`packages/opencode/script/build.ts\` | Keep ours (shuvcode naming) |
            | \`packages/opencode/bin/opencode\` | Keep ours (shuvcode binary lookup) |
            | \`packages/script/src/index.ts\` | Keep ours (version logic) |
            | \`.github/*\` workflow configs | Keep ours (fork-specific workflows) |
            | \`*.tsx\` with our features | Merge both - preserve our customizations AND upstream improvements |

            ### Step-by-Step Instructions

            1. **Setup upstream remote and fetch**:
               \`\`\`bash
               git remote add upstream https://github.com/sst/opencode.git 2>/dev/null || true
               git fetch upstream --tags
               \`\`\`

            2. **Start the merge**:
               \`\`\`bash
               git merge ${latestTag} --no-commit --no-ff
               \`\`\`

            3. **List and resolve each conflict** using the strategy table above:
               \`\`\`bash
               git diff --name-only --diff-filter=U
               \`\`\`

            4. **For each resolved file**:
               \`\`\`bash
               git add <file>
               \`\`\`

            5. **Verify no conflicts remain**:
               \`\`\`bash
               git diff --name-only --diff-filter=U  # Should be empty
               \`\`\`

            6. **Regenerate lockfile** (if bun.lock was conflicted):
               \`\`\`bash
               rm -f bun.lock
               bun install
               git add bun.lock
               \`\`\`

            7. **Commit the merge**:
               \`\`\`bash
               git commit -m "sync: merge upstream ${latestTag} into integration

               Resolved conflicts:
               - <list each file and resolution used>"
               \`\`\`

            8. **Update sync marker**:
               \`\`\`bash
               echo "${latestTag}" > .github/last-synced-tag
               git add .github/last-synced-tag
               git commit -m "sync: record last synced tag ${latestTag}"
               \`\`\`

            9. **Run validation**:
               \`\`\`bash
               bun install
               bun turbo typecheck
               bun turbo test
               \`\`\`

            10. **Push to origin** (this triggers the snapshot/release workflow):
                \`\`\`bash
                git push origin integration
                \`\`\`

            11. **Close this issue** after successful push:
                \`\`\`bash
                gh issue close ${issueNumber} --comment "Resolved - merged upstream ${latestTag}"
                \`\`\`

            ### Important Notes
            - **Never force-push** to integration branch
            - **Always preserve fork-specific changes** in publish.ts, build.ts, bin/opencode
            - If validation fails, fix the issues before pushing
            - The snapshot workflow will auto-trigger on push and publish to npm as \`shuvcode\`
            `;
            } else {
              // Validation failure case
              prompt = `/opencode

            ## Task: Fix Validation Failures After Upstream Merge

            The upstream merge of **${latestTag}** succeeded, but post-merge validation failed.

            ### Instructions

            1. **Pull the latest integration branch**:
               \`\`\`bash
               git fetch origin
               git checkout integration
               git pull origin integration
               \`\`\`

            2. **Install dependencies**:
               \`\`\`bash
               bun install
               \`\`\`

            3. **Run validation and identify failures**:
               \`\`\`bash
               bun turbo typecheck
               bun turbo test
               bun turbo build
               \`\`\`

            4. **Fix any type errors, test failures, or build issues**

            5. **Commit fixes**:
               \`\`\`bash
               git add .
               git commit -m "fix: resolve validation issues after merging ${latestTag}"
               \`\`\`

            6. **Re-run validation to confirm fixes**:
               \`\`\`bash
               bun turbo typecheck && bun turbo test && bun turbo build
               \`\`\`

            7. **Push to origin**:
               \`\`\`bash
               git push origin integration
               \`\`\`

            8. **Close this issue**:
               \`\`\`bash
               gh issue close ${issueNumber} --comment "Fixed validation issues after merging ${latestTag}"
               \`\`\`
            `;
            }

            // Post the comment to trigger opencode
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: prompt
            });

            console.log(`Posted opencode trigger comment on issue #${issueNumber}`);
