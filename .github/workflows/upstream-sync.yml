name: Upstream Sync

on:
  repository_dispatch:
    types: [upstream-release]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to sync (leave empty for latest)"
        type: string
        required: false

concurrency:
  group: upstream-sync
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  resolve-tag:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      latest_tag: ${{ steps.resolve.outputs.latest_tag }}
      latest_sha: ${{ steps.resolve.outputs.latest_sha }}
      should_sync: ${{ steps.resolve.outputs.should_sync }}
    steps:
      - name: Resolve tag and SHA
        id: resolve
        env:
          GITHUB_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ github.event.client_payload.tag || inputs.tag }}
        run: |
          set -euo pipefail

          api() {
            curl -fsSL -H "Accept: application/vnd.github+json" -H "Authorization: Bearer $GITHUB_TOKEN" "$1"
          }

          # Use provided tag or fetch latest
          if [ -n "${INPUT_TAG:-}" ]; then
            LATEST_TAG="$INPUT_TAG"
          else
            RELEASE=$(api "https://api.github.com/repos/sst/opencode/releases/latest")
            LATEST_TAG=$(echo "$RELEASE" | jq -r '.tag_name')
          fi

          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "null" ]; then
            echo "Unable to determine tag" >&2
            exit 1
          fi

          # Check if already synced (early exit to prevent duplicate work)
          LAST_SYNCED=$(api "https://api.github.com/repos/${{ github.repository }}/contents/.github/last-synced-tag?ref=integration" | jq -r '.content' | base64 -d | tr -d '\n' || echo "")
          if [ "$LATEST_TAG" = "$LAST_SYNCED" ]; then
            echo "Tag $LATEST_TAG already synced, skipping"
            echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
            echo "latest_sha=" >> "$GITHUB_OUTPUT"
            echo "should_sync=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Resolve tag to commit SHA
          TAG_REF=$(api "https://api.github.com/repos/sst/opencode/git/ref/tags/$LATEST_TAG")
          REF_TYPE=$(echo "$TAG_REF" | jq -r '.object.type')
          REF_SHA=$(echo "$TAG_REF" | jq -r '.object.sha')

          if [ "$REF_TYPE" = "tag" ]; then
            TAG_OBJECT=$(api "https://api.github.com/repos/sst/opencode/git/tags/$REF_SHA")
            LATEST_SHA=$(echo "$TAG_OBJECT" | jq -r '.object.sha')
          else
            LATEST_SHA="$REF_SHA"
          fi

          echo "Resolved tag: $LATEST_TAG -> $LATEST_SHA"
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "latest_sha=$LATEST_SHA" >> "$GITHUB_OUTPUT"
          echo "should_sync=true" >> "$GITHUB_OUTPUT"

  merge-upstream:
    needs: resolve-tag
    if: needs.resolve-tag.outputs.should_sync == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      merge_status: ${{ steps.merge.outputs.status }}
      conflict_files: ${{ steps.merge.outputs.conflict_files }}
    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          ref: integration
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/sst/opencode.git 2>/dev/null || true

      - name: Fetch upstream tag
        run: |
          git fetch upstream tag ${{ needs.resolve-tag.outputs.latest_tag }} --no-tags

      - name: Attempt merge
        id: merge
        run: |
          # Attempt merge with no-commit to detect conflicts first
          if git merge ${{ needs.resolve-tag.outputs.latest_tag }} --no-commit --no-ff 2>&1; then
            echo "Merge successful, no conflicts"
            # Check if there are changes to commit
            if git diff --cached --quiet; then
              echo "Already up to date, nothing to merge"
              echo "status=up-to-date" >> $GITHUB_OUTPUT
            else
              git commit -m "sync: merge upstream ${{ needs.resolve-tag.outputs.latest_tag }} into integration"
              echo "status=success" >> $GITHUB_OUTPUT
            fi
          else
            # Check for conflicts
            CONFLICTS=$(git diff --name-only --diff-filter=U)
            if [ -n "$CONFLICTS" ]; then
              echo "Conflicts detected in: $CONFLICTS"
              echo "status=conflict" >> $GITHUB_OUTPUT
              echo "conflict_files<<EOF" >> $GITHUB_OUTPUT
              echo "$CONFLICTS" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT

              # Attempt auto-resolution for known patterns
              UNRESOLVED=""
              for file in $CONFLICTS; do
                case "$file" in
                  bun.lock)
                    echo "Auto-resolving bun.lock by accepting upstream..."
                    git checkout --theirs bun.lock 2>/dev/null || true
                    git add bun.lock
                    ;;
                  *.md)
                    echo "Auto-resolving $file (accepting upstream)..."
                    git checkout --theirs "$file"
                    git add "$file"
                    ;;
                  *)
                    UNRESOLVED="$UNRESOLVED $file"
                    ;;
                esac
              done

              # Check if all conflicts were resolved
              REMAINING=$(git diff --name-only --diff-filter=U)
              if [ -z "$REMAINING" ]; then
                echo "All conflicts auto-resolved"
                git commit -m "sync: merge upstream ${{ needs.resolve-tag.outputs.latest_tag }} into integration (auto-resolved conflicts)"
                echo "status=auto-resolved" >> $GITHUB_OUTPUT
              else
                echo "Unresolved conflicts remain: $REMAINING"
                git merge --abort
                echo "status=needs-manual" >> $GITHUB_OUTPUT
              fi
            else
              echo "Merge failed for unknown reason"
              git merge --abort 2>/dev/null || true
              echo "status=failed" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Push integration branch
        if: steps.merge.outputs.status == 'success' || steps.merge.outputs.status == 'auto-resolved'
        run: |
          git push origin integration

      - name: Update last synced tag marker
        if: steps.merge.outputs.status == 'success' || steps.merge.outputs.status == 'auto-resolved' || steps.merge.outputs.status == 'up-to-date'
        run: |
          echo "${{ needs.resolve-tag.outputs.latest_tag }}" > .github/last-synced-tag
          git add .github/last-synced-tag
          git commit -m "sync: record last synced tag ${{ needs.resolve-tag.outputs.latest_tag }}" || true
          git push origin integration || true

  validate:
    needs: [resolve-tag, merge-upstream]
    if: needs.merge-upstream.outputs.merge_status == 'success' || needs.merge-upstream.outputs.merge_status == 'auto-resolved' || needs.merge-upstream.outputs.merge_status == 'up-to-date'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      validation_status: ${{ steps.validate.outputs.status }}
      validation_error: ${{ steps.validate.outputs.error }}
    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          ref: integration

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install

      - name: Run validation
        id: validate
        run: |
          set +e

          echo "Running typecheck..."
          bun turbo typecheck
          if [ $? -ne 0 ]; then
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "error=typecheck failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "Running tests..."
          bun turbo test
          if [ $? -ne 0 ]; then
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "error=tests failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "Running build..."
          bun turbo build
          if [ $? -ne 0 ]; then
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "error=build failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "status=success" >> $GITHUB_OUTPUT

  create-issue:
    needs: [resolve-tag, merge-upstream, validate]
    if: |
      always() &&
      (needs.merge-upstream.outputs.merge_status == 'needs-manual' ||
       needs.merge-upstream.outputs.merge_status == 'failed' ||
       needs.validate.outputs.validation_status == 'failed')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      issue_number: ${{ steps.create-conflict-issue.outputs.issue_number || steps.create-validation-issue.outputs.issue_number }}
    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          ref: integration

      - name: Create conflict issue
        id: create-conflict-issue
        if: needs.merge-upstream.outputs.merge_status == 'needs-manual'
        uses: actions/github-script@v7
        with:
          script: |
            const conflictFiles = `${{ needs.merge-upstream.outputs.conflict_files }}`;
            const latestTag = `${{ needs.resolve-tag.outputs.latest_tag }}`;
            const latestSha = `${{ needs.resolve-tag.outputs.latest_sha }}`;
            const issueTitle = `[Upstream Sync] Merge conflict with ${latestTag}`;

            // Check if an issue with this title already exists
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-sync'
            });

            const duplicate = existingIssues.data.find(issue => issue.title === issueTitle);
            if (duplicate) {
              console.log(`Issue already exists: #${duplicate.number}`);
              core.setOutput('issue_number', duplicate.number);
              core.setOutput('is_duplicate', 'true');
              return;
            }

            const body = `## Upstream Sync Conflict Report

            **Trigger**: Upstream sync at ${new Date().toISOString()}
            **Upstream Tag**: ${latestTag}
            **Upstream SHA**: ${latestSha}

            ### Conflicting Files

            \`\`\`
            ${conflictFiles}
            \`\`\`

            ### Recommended Actions

            1. Checkout integration branch locally
            2. Run: \`git fetch upstream && git merge ${latestTag}\`
            3. Resolve conflicts manually
            4. Run validation: \`bun install && bun turbo typecheck && bun turbo test\`
            5. Push resolved integration branch
            6. Close this issue

            ### Manual Sync Commands

            \`\`\`bash
            git remote add upstream https://github.com/sst/opencode.git 2>/dev/null || true
            git fetch upstream --tags
            git checkout integration
            git merge ${latestTag}
            # Resolve conflicts...
            bun install
            bun turbo typecheck
            bun turbo test
            git push origin integration
            \`\`\`
            `;

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: body,
              labels: ['upstream-sync', 'needs-manual-review']
            });

            core.setOutput('issue_number', issue.data.number);
            core.setOutput('is_duplicate', 'false');

      - name: Create validation failure issue
        id: create-validation-issue
        if: needs.validate.outputs.validation_status == 'failed'
        uses: actions/github-script@v7
        with:
          script: |
            const latestTag = `${{ needs.resolve-tag.outputs.latest_tag }}`;
            const error = `${{ needs.validate.outputs.validation_error }}`;
            const issueTitle = `[Upstream Sync] Validation failed after merging ${latestTag}`;

            // Check if an issue with this title already exists
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-sync'
            });

            const duplicate = existingIssues.data.find(issue => issue.title === issueTitle);
            if (duplicate) {
              console.log(`Issue already exists: #${duplicate.number}`);
              core.setOutput('issue_number', duplicate.number);
              core.setOutput('is_duplicate', 'true');
              return;
            }

            const body = `## Upstream Sync Validation Failure

            **Trigger**: Upstream sync at ${new Date().toISOString()}
            **Upstream Tag**: ${latestTag}
            **Error**: ${error}

            ### What happened

            The upstream sync merged successfully, but post-merge validation failed.

            ### Recommended Actions

            1. Check the [workflow run](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}) for detailed logs
            2. Checkout integration branch locally
            3. Run the failing validation step locally to debug
            4. Fix any issues and push to integration

            ### Validation Commands

            \`\`\`bash
            git fetch origin
            git checkout integration
            bun install
            bun turbo typecheck
            bun turbo test
            bun turbo build
            \`\`\`
            `;

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: body,
              labels: ['upstream-sync', 'needs-manual-review']
            });

            core.setOutput('issue_number', issue.data.number);
            core.setOutput('is_duplicate', 'false');

  close-issues-on-success:
    needs: [resolve-tag, merge-upstream, validate]
    if: |
      always() &&
      needs.validate.outputs.validation_status == 'success' &&
      (needs.merge-upstream.outputs.merge_status == 'success' || needs.merge-upstream.outputs.merge_status == 'auto-resolved')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Close related upstream-sync issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const latestTag = `${{ needs.resolve-tag.outputs.latest_tag }}`;

            // Find all open upstream-sync issues
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-sync'
            });

            for (const issue of issues.data) {
              // Close issues related to this tag or older
              if (issue.title.includes('[Upstream Sync]')) {
                console.log(`Closing issue #${issue.number}: ${issue.title}`);
                
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `✅ Automatically closed - upstream sync to ${latestTag} completed successfully.\n\nValidation passed: typecheck, tests, and build all succeeded.`
                });
                
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                  state_reason: 'completed'
                });
              }
            }

  trigger-opencode:
    needs: [resolve-tag, merge-upstream, create-issue]
    if: |
      always() &&
      needs.create-issue.outputs.issue_number != ''
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          ref: integration

      - name: Read fork features
        id: fork-features
        run: |
          if [ -f "script/sync/fork-features.json" ]; then
            # Extract features as a formatted list for the prompt
            FEATURES=$(cat script/sync/fork-features.json | jq -r '.features[] | "- PR #\(.pr): \(.title) (@\(.author))\n  Files: \(.files | join(", "))\n  Description: \(.description)"')
            echo "features<<EOF" >> $GITHUB_OUTPUT
            echo "$FEATURES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            
            # Extract just the file paths for conflict matching
            FILES=$(cat script/sync/fork-features.json | jq -r '[.features[].files[]] | unique | .[]')
            echo "files<<EOF" >> $GITHUB_OUTPUT
            echo "$FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "features=" >> $GITHUB_OUTPUT
            echo "files=" >> $GITHUB_OUTPUT
          fi

      - name: Trigger opencode to resolve conflicts
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const issueNumber = parseInt(`${{ needs.create-issue.outputs.issue_number }}`);
            const latestTag = `${{ needs.resolve-tag.outputs.latest_tag }}`;
            const conflictFiles = `${{ needs.merge-upstream.outputs.conflict_files }}`;
            const mergeStatus = `${{ needs.merge-upstream.outputs.merge_status }}`;
            const forkFeatures = `${{ steps.fork-features.outputs.features }}`;
            const forkFeatureFiles = `${{ steps.fork-features.outputs.files }}`;

            // Build the opencode prompt based on the issue type
            let prompt;

            if (mergeStatus === 'needs-manual') {
              prompt = `/opencode

            ## Task: Resolve Upstream Merge Conflicts

            Sync the shuvcode fork from upstream sst/opencode tag **${latestTag}**, resolve all merge conflicts, and complete the integration.

            ### Repository Context
            - **Upstream**: \`sst/opencode\` (original project)
            - **Fork**: \`Latitudes-Dev/shuvcode\` (customized downstream fork)
            - **Integration branch**: \`integration\` (where we merge upstream changes)

            ### Conflicting Files
            \`\`\`
            ${conflictFiles}
            \`\`\`

            ### CRITICAL: Fork Feature Files (MUST PRESERVE)

            This fork contains features from upstream PRs that have NOT yet been merged upstream.
            These features MUST be preserved during the merge. The fork-features.json file at
            \`script/sync/fork-features.json\` contains the authoritative list.

            **Merged PRs in this fork:**
            ${forkFeatures}

            **Fork feature files that require special handling:**
            \`\`\`
            ${forkFeatureFiles}
            \`\`\`

            **IMPORTANT**: When any of these files have conflicts:
            1. Do NOT simply accept upstream changes - this will DELETE our features
            2. Carefully merge to preserve BOTH upstream improvements AND our fork features
            3. Read the file content before and after to verify features are preserved
            4. Test that the feature still works after merging

            ### Conflict Resolution Strategy

            Follow these resolution patterns for each file type:

            | File Pattern | Resolution |
            |--------------|------------|
            | Fork feature files (see above) | **MERGE CAREFULLY** - preserve our features while integrating upstream changes |
            | \`STATS.md\`, \`nix/hashes.json\` | Accept upstream (\`git checkout --theirs\`) |
            | \`bun.lock\` | Delete and regenerate with \`bun install\` |
            | \`packages/opencode/script/publish.ts\` | Keep ours (fork-specific publishing) |
            | \`packages/opencode/script/build.ts\` | Keep ours (shuvcode naming) |
            | \`packages/opencode/bin/opencode\` | Keep ours (shuvcode binary lookup) |
            | \`packages/script/src/index.ts\` | Keep ours (version logic) |
            | \`.github/*\` workflow configs | Keep ours (fork-specific workflows) |
            | \`README.md\` | Keep ours (fork-specific documentation with PR table) |

            ### Step-by-Step Instructions

            1. **Review fork-features.json first**:
               \`\`\`bash
               cat script/sync/fork-features.json
               \`\`\`
               This file lists all PRs and their files that MUST be preserved.

            2. **Setup upstream remote and fetch**:
               \`\`\`bash
               git remote add upstream https://github.com/sst/opencode.git 2>/dev/null || true
               git fetch upstream --tags
               \`\`\`

            3. **Start the merge**:
               \`\`\`bash
               git merge ${latestTag} --no-commit --no-ff
               \`\`\`

            4. **List conflicts and identify fork feature files**:
               \`\`\`bash
               git diff --name-only --diff-filter=U
               \`\`\`
               Cross-reference with fork-features.json to identify critical files.

            5. **For fork feature file conflicts**: Read both versions, understand the changes, and manually merge to preserve our features while integrating upstream improvements.

            6. **For each resolved file**:
               \`\`\`bash
               git add <file>
               \`\`\`

            7. **Verify no conflicts remain**:
               \`\`\`bash
               git diff --name-only --diff-filter=U  # Should be empty
               \`\`\`

            8. **Regenerate lockfile** (if bun.lock was conflicted):
               \`\`\`bash
               rm -f bun.lock
               bun install
               git add bun.lock
               \`\`\`

            9. **Commit the merge**:
               \`\`\`bash
               git commit -m "sync: merge upstream ${latestTag} into integration

               Resolved conflicts:
               - <list each file and resolution used>
               
               Preserved fork features:
               - <list PR numbers and features preserved>"
               \`\`\`

            10. **Update sync marker**:
                \`\`\`bash
                echo "${latestTag}" > .github/last-synced-tag
                git add .github/last-synced-tag
                git commit -m "sync: record last synced tag ${latestTag}"
                \`\`\`

            11. **Run validation**:
                \`\`\`bash
                bun install
                bun turbo typecheck
                bun turbo test
                \`\`\`

            12. **Push branch to origin**:
                \`\`\`bash
                git push origin HEAD
                \`\`\`

            13. **Create or find existing PR**:
                \`\`\`bash
                # Check if PR already exists for this branch
                EXISTING_PR=$(gh pr list --head "$(git branch --show-current)" --json number --jq '.[0].number' --repo Latitudes-Dev/shuvcode 2>/dev/null || echo "")
                if [ -n "$EXISTING_PR" ]; then
                  echo "PR #$EXISTING_PR already exists"
                  PR_NUMBER=$EXISTING_PR
                else
                  # Create PR targeting integration branch
                  PR_URL=$(gh pr create --title "sync: merge upstream ${latestTag}" --body "Resolves conflicts from upstream ${latestTag} merge. Closes #${issueNumber}" --base integration --repo Latitudes-Dev/shuvcode)
                  PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
                  echo "Created PR #$PR_NUMBER"
                fi
                \`\`\`

            14. **Wait for CI checks to pass, then merge the PR**:
                \`\`\`bash
                # Wait for checks and merge (auto-merge when checks pass)
                gh pr merge "$PR_NUMBER" --squash --auto --delete-branch --repo Latitudes-Dev/shuvcode
                \`\`\`

            15. **Close this issue** after PR is merged:
                \`\`\`bash
                gh issue close ${issueNumber} --comment "Resolved - merged upstream ${latestTag} via PR #$PR_NUMBER" --repo Latitudes-Dev/shuvcode
                \`\`\`

            ### Important Notes
            - **Never force-push** to integration branch
            - **Always preserve fork-specific changes** in publish.ts, build.ts, bin/opencode
            - **CRITICAL**: Always preserve fork feature files listed in fork-features.json
            - If validation fails, fix the issues before pushing
            - The PR will be auto-merged once CI checks pass, triggering the snapshot workflow
            `;
            } else {
              // Validation failure case
              prompt = `/opencode

            ## Task: Fix Validation Failures After Upstream Merge

            The upstream merge of **${latestTag}** succeeded, but post-merge validation failed.

            ### Fork Features Context

            This fork contains features from upstream PRs that have NOT yet been merged upstream.
            Review \`script/sync/fork-features.json\` to understand what features must be preserved.
            Validation failures may be related to conflicts between upstream changes and our fork features.

            **Merged PRs in this fork:**
            ${forkFeatures}

            ### Instructions

            1. **Review fork-features.json**:
               \`\`\`bash
               cat script/sync/fork-features.json
               \`\`\`

            2. **Pull the latest integration branch**:
               \`\`\`bash
               git fetch origin
               git checkout integration
               git pull origin integration
               \`\`\`

            3. **Install dependencies**:
               \`\`\`bash
               bun install
               \`\`\`

            4. **Run validation and identify failures**:
               \`\`\`bash
               bun turbo typecheck
               bun turbo test
               bun turbo build
               \`\`\`

            5. **Fix any type errors, test failures, or build issues**
               - If failures are in fork feature files, ensure you preserve the feature functionality
               - Cross-reference with fork-features.json to understand what each file should contain

            6. **Commit fixes**:
               \`\`\`bash
               git add .
               git commit -m "fix: resolve validation issues after merging ${latestTag}"
               \`\`\`

            7. **Re-run validation to confirm fixes**:
               \`\`\`bash
               bun turbo typecheck && bun turbo test && bun turbo build
               \`\`\`

            8. **Push branch to origin**:
                \`\`\`bash
                git push origin HEAD
                \`\`\`

            9. **Create or find existing PR**:
                \`\`\`bash
                # Check if PR already exists for this branch
                EXISTING_PR=$(gh pr list --head "$(git branch --show-current)" --json number --jq '.[0].number' --repo Latitudes-Dev/shuvcode 2>/dev/null || echo "")
                if [ -n "$EXISTING_PR" ]; then
                  echo "PR #$EXISTING_PR already exists"
                  PR_NUMBER=$EXISTING_PR
                else
                  # Create PR targeting integration branch
                  PR_URL=$(gh pr create --title "fix: resolve validation issues after ${latestTag}" --body "Fixes validation failures from upstream ${latestTag} merge. Closes #${issueNumber}" --base integration --repo Latitudes-Dev/shuvcode)
                  PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
                  echo "Created PR #$PR_NUMBER"
                fi
                \`\`\`

            10. **Wait for CI checks to pass, then merge the PR**:
                \`\`\`bash
                # Wait for checks and merge (auto-merge when checks pass)
                gh pr merge "$PR_NUMBER" --squash --auto --delete-branch --repo Latitudes-Dev/shuvcode
                \`\`\`

            11. **Close this issue** after PR is merged:
                \`\`\`bash
                gh issue close ${issueNumber} --comment "Fixed validation issues after merging ${latestTag} via PR #$PR_NUMBER" --repo Latitudes-Dev/shuvcode
                \`\`\`
            `;
            }

