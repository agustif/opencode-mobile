# Docker Compose for self-hosted GitHub Actions runners
#
# Usage:
#   1. Get a runner token from GitHub:
#      Settings -> Actions -> Runners -> New self-hosted runner -> Copy token
#
#   2. Create .env file with:
#      GITHUB_REPOSITORY=kcrommett/shuvcode
#      RUNNER_TOKEN=<your-token>
#
#   3. Start runners:
#      docker compose up -d
#
#   4. Scale runners (optional):
#      docker compose up -d --scale runner=3

services:
  runner:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - GITHUB_REPOSITORY=${GITHUB_REPOSITORY:-kcrommett/shuvcode}
      - RUNNER_TOKEN=${RUNNER_TOKEN}
      - RUNNER_NAME=${RUNNER_NAME:-shuvcode-runner}
      - RUNNER_LABELS=${RUNNER_LABELS:-self-hosted,linux,x64,dev-server}
    volumes:
      # Mount docker socket for docker-in-docker capabilities
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent work directory (optional, for caching)
      - runner-work:/home/runner/actions-runner/_work
    restart: unless-stopped
    # Resource limits (adjust based on your server)
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

volumes:
  runner-work:
